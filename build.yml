name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flask
          pip install python-libtorrent

      - name: Buildar EXE com PyInstaller
        run: |
          pyinstaller --onefile --name torrent_stream --hidden-import=libtorrent torrent_stream.py

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows
          path: dist/torrent_stream.exe
