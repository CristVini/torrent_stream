name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: torrent-env

      - name: Instalar dependências via conda + pip
        shell: conda-run torrent-env bash -el {0}
        run: |
          conda install -c conda-forge libtorrent -y
          pip install pyinstaller flask

      - name: Buildar EXE com PyInstaller
        shell: conda-run torrent-env bash -el {0}
        run: |
          pyinstaller --onefile --name torrent_stream \
            --hidden-import=libtorrent \
            --collect-binaries=libtorrent \
            torrent_stream.py

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows
          path: dist/torrent_stream.exe