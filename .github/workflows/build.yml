name: Build Windows EXE (Nuitka) - v6 (Based on Original)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install `
            libtorrent `
            libtorrent-windows-dll `
            flask `
            flask-cors `
            requests `
            nyaapy `
            beautifulsoup4 `
            ffmpeg-python `
            pystray `
            pillow `
            nuitka `
            ordered-set `
            zstandard
          python -c "import libtorrent; print('libtorrent OK:', libtorrent.version)"

      - name: Compilar com Nuitka
        run: |
          $lt_file = python -c "import libtorrent; print(libtorrent.__file__)"
          Write-Host "libtorrent file: $lt_file"

          $nuitka_args = @(
            "-m", "nuitka",
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            "--enable-plugin=tk-inter",
            "--output-filename=torrent_stream.exe",

            # ── INCLUSÃO DE MÓDULOS MODULARES (NOVO) ────────────────────────
            "--include-package=core",
            "--include-package=engines",
            "--follow-imports",

            # Flask stack (Igual ao seu original)
            "--include-package=flask",
            "--include-package=flask_cors",
            "--include-package=werkzeug",
            "--include-package=jinja2",
            "--include-package=click",
            "--include-package=itsdangerous",
            "--include-package=markupsafe",

            # HTTP + scraping (Igual ao seu original)
            "--include-package=requests",
            "--include-package=urllib3",
            "--include-package=certifi",
            "--include-package=charset_normalizer",
            "--include-package=idna",
            "--include-package=bs4",
            "--include-package=nyaapy",

            # libtorrent native extension (Igual ao seu original)
            "--include-data-files=$lt_file=libtorrent.pyd",

            # ── MODO DE CONSOLE (O SEGREDO) ──────────────────────────────────
            # Restaurado para 'attach' como no seu original que funcionava
            "--windows-console-mode=attach"
          )

          if (Test-Path "icon.ico") {
            Write-Host "Ícone encontrado."
            $nuitka_args += "--windows-icon-from-ico=icon.ico"
          }

          # Ponto de entrada (Ajustado para main.py da versão modular)
          $nuitka_args += "main.py"
          
          python @nuitka_args

      - name: Verificar EXE gerado
        run: |
          if (Test-Path "torrent_stream.exe") {
            $size = (Get-Item "torrent_stream.exe").length / 1MB
            Write-Host "✅ torrent_stream.exe gerado — $([math]::Round($size,1)) MB"
          } else {
            Write-Error "❌ EXE não encontrado!"
            exit 1
          }

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows_v6
          path: torrent_stream.exe
          retention-days: 30