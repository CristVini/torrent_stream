name: Build Windows EXE (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install libtorrent libtorrent-windows-dll flask flask-cors nuitka ordered-set zstandard
          python -c "import libtorrent; print('libtorrent OK:', libtorrent.version)"

      - name: Compilar com Nuitka
        run: |
          # Descobre onde o libtorrent está instalado
          $lt_dir = python -c "import libtorrent, os; print(os.path.dirname(libtorrent.__file__))"
          $lt_file = python -c "import libtorrent; print(libtorrent.__file__)"
          Write-Host "libtorrent dir: $lt_dir"
          Write-Host "libtorrent file: $lt_file"

          # Lista todos os arquivos na pasta do libtorrent para debug
          Get-ChildItem -Path $lt_dir | ForEach-Object { Write-Host $_.FullName }

          $nuitka_args = @(
            "-m", "nuitka",
            "--assume-yes-for-downloads",
            "--onefile",
            "--standalone",
            "--output-filename=torrent_stream.exe",
            "--include-package=flask",
            "--include-package=flask_cors",
            "--include-package=werkzeug",
            "--include-package=jinja2",
            "--include-package=click",
            "--include-data-files=$lt_file=libtorrent.pyd",
            "--windows-console-mode=attach
            "--enable-plugin=tk-inter","
          )

          if (Test-Path "icon.ico") {
            $nuitka_args += "--windows-icon-from-ico=icon.ico"
          }

          $nuitka_args += "torrent_stream.py"
          python @nuitka_args

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows
          path: torrent_stream.exe