name: Build Windows EXE (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Visual C++ Redistributable (libtorrent precisa das DLLs MSVC) ─────
      - name: Instalar Visual C++ Redistributable
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $out = "$env:TEMP\vc_redist.x64.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -Args "/install /quiet /norestart" -Wait
          Write-Host "✅ VC++ Redistributable instalado"

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip

          # libtorrent: wheel oficial do PyPI para Windows + Python 3.11
          # O pacote 'libtorrent' no PyPI (mantido por arvidn) inclui as DLLs
          pip install "libtorrent==2.0.9"

          pip install `
            flask `
            flask-cors `
            requests `
            nyaapy `
            beautifulsoup4 `
            pystray `
            pillow `
            nuitka `
            ordered-set `
            zstandard

          # Verificações
          python -c "import libtorrent; print('libtorrent OK:', libtorrent.version)"
          python -c "import flask;      print('flask      OK')"
          python -c "import requests;   print('requests   OK')"
          python -c "import nyaapy;     print('nyaapy     OK')"
          python -c "import pystray;    print('pystray    OK')"

      - name: Inspecionar pacote libtorrent
        id: lt_info
        run: |
          python -c "
          import libtorrent, os, glob, sys

          pkg_dir = os.path.dirname(os.path.abspath(libtorrent.__file__))
          print('pkg_dir:', pkg_dir)
          print('__file__:', libtorrent.__file__)
          print('Arquivos no pacote:')
          for f in sorted(os.listdir(pkg_dir)):
              full = os.path.join(pkg_dir, f)
              size = os.path.getsize(full)
              print(f'  {f}  ({size} bytes)')
          "

          # Salva o pkg_dir para o próximo step
          $pkg_dir = python -c "import libtorrent,os; print(os.path.dirname(os.path.abspath(libtorrent.__file__)))"
          echo "PKG_DIR=$pkg_dir" >> $env:GITHUB_OUTPUT
          Write-Host "PKG_DIR=$pkg_dir"

      - name: Copiar arquivos do libtorrent para bundle
        id: lt_bundle
        run: |
          $pkg_dir = "${{ steps.lt_info.outputs.PKG_DIR }}"
          New-Item -ItemType Directory -Force -Path "lt_bundle" | Out-Null

          # Copia .pyd, .dll e .pyi do libtorrent
          $copied = @()
          Get-ChildItem $pkg_dir -Recurse -Include "*.pyd","*.dll","*.pyi" | ForEach-Object {
            Copy-Item $_.FullName -Destination "lt_bundle\" -Force
            $copied += $_.Name
            Write-Host "Copiado: $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)"
          }

          if ($copied.Count -eq 0) {
            # Fallback: copia tudo que não for .py
            Get-ChildItem $pkg_dir | Where-Object { $_.Extension -ne ".py" -and -not $_.PSIsContainer } | ForEach-Object {
              Copy-Item $_.FullName -Destination "lt_bundle\" -Force
              Write-Host "Fallback copiado: $($_.Name)"
            }
          }

          Write-Host "`nConteúdo de lt_bundle/:"
          Get-ChildItem "lt_bundle" | ForEach-Object { Write-Host "  $($_.Name)" }

          # Verifica se há algum arquivo útil
          $total = (Get-ChildItem "lt_bundle").Count
          if ($total -eq 0) {
            Write-Error "lt_bundle está vazio — verifique a instalação do libtorrent"
            exit 1
          }

      - name: Compilar com Nuitka
        run: |
          # Monta --include-data-files para cada arquivo em lt_bundle/
          $data_args = @()
          Get-ChildItem "lt_bundle" | ForEach-Object {
            $data_args += "--include-data-files=lt_bundle\$($_.Name)=$($_.Name)"
          }

          $nuitka_args = @(
            "-m", "nuitka",
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            "--enable-plugin=tk-inter",
            "--output-filename=torrent_stream.exe",

            # ── stdlib para DLNA/UPnP, SSE e Flask ───────────────────────────
            "--include-module=socket",
            "--include-module=select",
            "--include-module=socketserver",
            "--include-module=http.server",
            "--include-module=urllib.request",
            "--include-module=urllib.parse",
            "--include-module=xml.etree.ElementTree",
            "--include-module=contextlib",
            "--include-module=mimetypes",
            "--include-module=weakref",
            "--include-module=queue",
            "--include-module=threading",
            "--include-module=json",
            "--include-module=re",
            "--include-module=shutil",
            "--include-module=subprocess",

            # ── Flask stack ───────────────────────────────────────────────────
            "--include-package=flask",
            "--include-package=flask_cors",
            "--include-package=werkzeug",
            "--include-package=jinja2",
            "--include-package=click",
            "--include-package=itsdangerous",
            "--include-package=markupsafe",

            # ── HTTP + scraping ───────────────────────────────────────────────
            "--include-package=requests",
            "--include-package=urllib3",
            "--include-package=certifi",
            "--include-package=charset_normalizer",
            "--include-package=idna",
            "--include-package=bs4",
            "--include-package=nyaapy",

            # ── System tray ───────────────────────────────────────────────────
            "--include-package=pystray",
            "--include-package=PIL",

            "--windows-console-mode=attach"
          )

          # Adiciona todos os arquivos do libtorrent
          $nuitka_args += $data_args

          if (Test-Path "icon.ico") {
            $nuitka_args += "--windows-icon-from-ico=icon.ico"
            Write-Host "Ícone: icon.ico"
          }

          $nuitka_args += "torrent_stream.py"

          Write-Host "Chamando Nuitka com $($nuitka_args.Count) argumentos..."
          python @nuitka_args

      - name: Verificar EXE gerado
        run: |
          if (Test-Path "torrent_stream.exe") {
            $size = (Get-Item "torrent_stream.exe").length / 1MB
            Write-Host "✅ torrent_stream.exe — $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "❌ EXE não encontrado após compilação!"
            exit 1
          }

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows
          path: torrent_stream.exe
          retention-days: 30