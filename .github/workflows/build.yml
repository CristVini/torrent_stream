name: Build Windows EXE (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip

          # libtorrent 2.0.11 tem wheel oficial cp311-win_amd64 no PyPI
          # libtorrent-windows-dll fornece as DLLs OpenSSL necessárias no Windows
          pip install "libtorrent==2.0.11" libtorrent-windows-dll

          pip install `
            flask `
            flask-cors `
            requests `
            nyaapy `
            beautifulsoup4 `
            pystray `
            pillow `
            nuitka `
            ordered-set `
            zstandard

          # Verificações — se libtorrent falhar aqui, o build para com mensagem clara
          python -c "import libtorrent; print('libtorrent OK:', libtorrent.version)"
          python -c "import flask;      print('flask      OK:', flask.__version__)"
          python -c "import requests;   print('requests   OK:', requests.__version__)"
          python -c "import nyaapy;     print('nyaapy     OK')"
          python -c "import pystray;    print('pystray    OK')"

      - name: Localizar arquivos do libtorrent
        id: lt_info
        run: |
          # Mostra tudo sobre o pacote instalado (útil para debug)
          python -c "
          import libtorrent, os, glob

          pkg_dir = os.path.dirname(os.path.abspath(libtorrent.__file__))
          print('version  :', libtorrent.version)
          print('__file__ :', libtorrent.__file__)
          print('pkg_dir  :', pkg_dir)
          print()
          print('Arquivos no pacote:')
          for f in sorted(os.listdir(pkg_dir)):
              size = os.path.getsize(os.path.join(pkg_dir, f))
              print(f'  {f}  ({size:,} bytes)')
          "

          $pkg_dir = python -c "
          import libtorrent, os
          print(os.path.dirname(os.path.abspath(libtorrent.__file__)))
          "
          $pkg_dir = $pkg_dir.Trim()
          Write-Host "PKG_DIR=$pkg_dir"
          echo "PKG_DIR=$pkg_dir" >> $env:GITHUB_OUTPUT

      - name: Localizar DLLs do libtorrent-windows-dll
        id: lt_dlls
        run: |
          # libtorrent-windows-dll instala as DLLs OpenSSL em site-packages
          $dll_info = python -c "
          import importlib.util, os, glob, sys

          # Procura o pacote libtorrent_windows_dll
          for name in ['libtorrent_windows_dll', 'libtorrent-windows-dll']:
              spec = importlib.util.find_spec(name)
              if spec:
                  print(os.path.dirname(spec.origin))
                  break
          else:
              # Fallback: procura DLLs em todo o site-packages
              import site
              for sp in site.getsitepackages():
                  dlls = glob.glob(os.path.join(sp, '*.dll'))
                  if dlls:
                      print(sp)
                      break
              else:
                  print('')
          "
          $dll_dir = $dll_info.Trim()
          Write-Host "DLL_DIR=$dll_dir"
          echo "DLL_DIR=$dll_dir" >> $env:GITHUB_OUTPUT

      - name: Montar bundle com todos os arquivos nativos
        run: |
          $pkg_dir = "${{ steps.lt_info.outputs.PKG_DIR }}"
          $dll_dir = "${{ steps.lt_dlls.outputs.DLL_DIR }}"

          New-Item -ItemType Directory -Force -Path "lt_bundle" | Out-Null

          # 1. Copia .pyd e .dll do pacote libtorrent
          Write-Host "=== libtorrent pkg ($pkg_dir) ==="
          Get-ChildItem $pkg_dir -Include "*.pyd","*.dll" -Recurse | ForEach-Object {
            Copy-Item $_.FullName "lt_bundle\" -Force
            Write-Host "  + $($_.Name)"
          }

          # 2. Copia DLLs do libtorrent-windows-dll (OpenSSL etc.)
          if ($dll_dir -and (Test-Path $dll_dir)) {
            Write-Host "=== libtorrent-windows-dll ($dll_dir) ==="
            Get-ChildItem $dll_dir -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName "lt_bundle\" -Force
              Write-Host "  + $($_.Name)"
            }
          } else {
            Write-Host "⚠ libtorrent-windows-dll não encontrado — pode funcionar mesmo assim"
          }

          Write-Host "`n=== Conteúdo final de lt_bundle/ ==="
          Get-ChildItem "lt_bundle" | ForEach-Object {
            Write-Host "  $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)"
          }

          if ((Get-ChildItem "lt_bundle").Count -eq 0) {
            Write-Error "lt_bundle vazio — instalação do libtorrent falhou"
            exit 1
          }

      - name: Compilar com Nuitka
        run: |
          # Gera um --include-data-files para cada arquivo em lt_bundle/
          $data_args = Get-ChildItem "lt_bundle" | ForEach-Object {
            "--include-data-files=lt_bundle\$($_.Name)=$($_.Name)"
          }

          $nuitka_args = @(
            "-m", "nuitka",
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            "--enable-plugin=tk-inter",
            "--output-filename=torrent_stream.exe",

            # stdlib para DLNA/UPnP, SSE, Flask
            "--include-module=socket",
            "--include-module=select",
            "--include-module=socketserver",
            "--include-module=http.server",
            "--include-module=urllib.request",
            "--include-module=urllib.parse",
            "--include-module=xml.etree.ElementTree",
            "--include-module=contextlib",
            "--include-module=mimetypes",
            "--include-module=weakref",
            "--include-module=queue",
            "--include-module=threading",
            "--include-module=json",
            "--include-module=re",
            "--include-module=shutil",
            "--include-module=subprocess",

            # Flask stack
            "--include-package=flask",
            "--include-package=flask_cors",
            "--include-package=werkzeug",
            "--include-package=jinja2",
            "--include-package=click",
            "--include-package=itsdangerous",
            "--include-package=markupsafe",

            # HTTP + scraping
            "--include-package=requests",
            "--include-package=urllib3",
            "--include-package=certifi",
            "--include-package=charset_normalizer",
            "--include-package=idna",
            "--include-package=bs4",
            "--include-package=nyaapy",

            # System tray
            "--include-package=pystray",
            "--include-package=PIL",

            "--windows-console-mode=attach"
          )

          $nuitka_args += $data_args

          if (Test-Path "icon.ico") {
            $nuitka_args += "--windows-icon-from-ico=icon.ico"
            Write-Host "Ícone: icon.ico"
          }

          $nuitka_args += "torrent_stream.py"

          Write-Host "Iniciando Nuitka ($($nuitka_args.Count) args)..."
          python @nuitka_args

      - name: Verificar EXE gerado
        run: |
          if (Test-Path "torrent_stream.exe") {
            $size = (Get-Item "torrent_stream.exe").length / 1MB
            Write-Host "✅ torrent_stream.exe — $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "❌ EXE não encontrado!"
            exit 1
          }

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_windows
          path: torrent_stream.exe
          retention-days: 30