name: Build Windows EXE (Nuitka) - v4 (Final GUI)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install `
            libtorrent `
            libtorrent-windows-dll `
            flask `
            flask-cors `
            requests `
            nyaapy `
            beautifulsoup4 `
            ffmpeg-python `
            pystray `
            pillow `
            nuitka `
            ordered-set `
            zstandard
          python -c "import libtorrent; print('libtorrent OK')"

      - name: Compilar com Nuitka
        run: |
          $lt_file = python -c "import libtorrent; print(libtorrent.__file__)"
          
          $nuitka_args = @(
            "-m", "nuitka",
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            
            # ── INTERFACE GRÁFICA (RESTORED) ─────────────────────────────────
            "--enable-plugin=tk-inter",
            "--windows-console-mode=disable", # Remove a janela preta, abre apenas a GUI
            
            "--output-filename=torrent_stream.exe",

            # ── INCLUSÃO DE MÓDULOS ──────────────────────────────────────────
            "--include-package=core",
            "--include-package=engines",
            "--follow-imports",

            # Dependências de rede e sistema
            "--include-module=socket",
            "--include-module=select",
            "--include-module=http.server",
            "--include-module=urllib.request",
            "--include-module=xml.etree.ElementTree",

            # Flask stack
            "--include-package=flask",
            "--include-package=flask_cors",
            "--include-package=werkzeug",
            "--include-package=jinja2",
            "--include-package=click",
            "--include-package=itsdangerous",
            "--include-package=markupsafe",

            # HTTP + scraping
            "--include-package=requests",
            "--include-package=urllib3",
            "--include-package=certifi",
            "--include-package=charset_normalizer",
            "--include-package=idna",
            "--include-package=bs4",
            "--include-package=nyaapy",

            # libtorrent native extension
            "--include-data-files=$lt_file=libtorrent.pyd"
          )

          if (Test-Path "icon.ico") {
            $nuitka_args += "--windows-icon-from-ico=icon.ico"
          }

          # Ponto de entrada modular
          $nuitka_args += "main.py"

          python @nuitka_args

      - name: Verificar EXE gerado
        run: |
          if (Test-Path "torrent_stream.exe") {
            $size = (Get-Item "torrent_stream.exe").length / 1MB
            Write-Host "✅ EXE gerado com sucesso: $([math]::Round($size,1)) MB"
          } else {
            Write-Error "❌ Falha no build!"
            exit 1
          }

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: torrent_stream_final
          path: torrent_stream.exe
          retention-days: 30